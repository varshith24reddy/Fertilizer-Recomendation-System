<!DOCTYPE html>
<html>
<head>
    <title>Fertilizer Recommendation</title>
</head>
<body>

    <h2>Smart Fertilizer Recommendation System 🌱</h2>

    <form action="/predict" method="post">
        Temperature: <input type="text" name="temperature"><br><br>
        Humidity: <input type="text" name="humidity"><br><br>
        Moisture: <input type="text" name="moisture"><br><br>

        Soil Type:
        <select name="soil">
            <option>Sandy</option>
            <option>Loamy</option>
            <option>Black</option>
            <option>Red</option>
            <option>Clayey</option>
        </select><br><br>

        Crop Type:
        <select name="crop">
            <option>Maize</option>
            <option>Sugarcane</option>
            <option>Cotton</option>
            <option>Tobacco</option>
            <option>Paddy</option>
        </select><br><br>

        Nitrogen: <input type="text" name="n"><br><br>
        Phosphorus: <input type="text" name="p"><br><br>
        Potassium: <input type="text" name="k"><br><br>

        <button type="submit">Predict</button>
    </form>

    <h3>{{ prediction_text }}</h3>

</body>
</html>
